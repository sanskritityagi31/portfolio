<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sanskriti Tyagi | Portfolio</title>
  <style>
    :root {
      --bg: #0f1720;
      --card: #111827;
      --text: #e6eef6;
      --muted: #9ca3af;
      --accent: #6ee7b7;
    }
    [data-theme="light"] {
      --bg: #f9fafb;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #4b5563;
      --accent: #06b6d4;
    }
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background-color: var(--bg);
      color: var(--text);
      transition: background 0.3s, color 0.3s;
    }
    header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      max-width: 900px;
      margin: 40px auto;
      background: var(--card);
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
      padding: 2rem;
    }
    header img {
      width: 180px;
      height: 180px;
      border-radius: 10px;
      object-fit: cover;
      border: 2px solid var(--accent);
    }
    .intro {
      max-width: 400px;
    }
    h1 {
      margin: 0;
      font-size: 1.8rem;
    }
    p {
      margin: 8px 0;
      color: var(--muted);
      line-height: 1.5;
    }
    .links a {
      text-decoration: none;
      display: inline-block;
      margin-right: 8px;
      margin-top: 8px;
      padding: 8px 14px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      border: 1px solid var(--accent);
      color: var(--text);
      transition: 0.3s;
    }
    .links a:hover {
      background-color: var(--accent);
      color: #042028;
    }
    #themeToggle {
      background: transparent;
      border: none;
      font-size: 20px;
      cursor: pointer;
      margin-top: 10px;
      color: var(--muted);
    }
    footer {
      text-align: center;
      margin-top: 30px;
      color: var(--muted);
      font-size: 0.9rem;
      padding-bottom: 20px;
    }
  </style>
</head>
<body>
  <header>
    <img src="assets/sanskriti.jpg" alt="Sanskriti Tyagi">
    <div class="intro">
      <h1>Sanskriti Tyagi</h1>
      <p>3rd Year Engineering Student | SDE & Analytics Enthusiast</p>
      <p>AI • Cloud • Data</p>
      <p><b>Education:</b> 10th - 74% | 12th - 88.2%</p>
      <div class="links">
        <a href="mailto:sanskritityagi02@gmail.com">Email</a>
        <a href="https://github.com/sanskritityagi31" target="_blank">GitHub</a>
        <a href="https://www.linkedin.com/in/sanskriti-tyagi" target="_blank">LinkedIn</a>
        <a href="assets/resume.pdf" target="_blank">Resume</a>
      </div>
      <button id="themeToggle">🌙</button>
    </div>
  </header>

  <footer>
    <p>© 2025 Sanskriti Tyagi | Built with HTML, CSS, and ❤️</p>
  </footer>

  <script>
    const toggle = document.getElementById("themeToggle");
    const root = document.documentElement;

    function setTheme(mode) {
      if (mode === "light") {
        root.setAttribute("data-theme", "light");
        toggle.textContent = "☀️";
      } else {
        root.removeAttribute("data-theme");
        toggle.textContent = "🌙";
      }
      localStorage.setItem("theme", mode);
    }

    const savedTheme = localStorage.getItem("theme") || "dark";
    setTheme(savedTheme);

    toggle.addEventListener("click", () => {
      const newTheme = root.hasAttribute("data-theme") ? "dark" : "light";
      setTheme(newTheme);
    });
  </script>
</body>
</html>
